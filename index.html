<!DOCTYPE html>
<html class="dark" lang="en">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>CycleSync - Holistic Health</title>
    <link href="https://fonts.googleapis.com/css2?family=Lexend:wght@100..900&amp;display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <script>
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#7f19e6",
                        "primary-hover": "#6814bd",
                        "background-light": "#f7f6f8",
                        "background-dark": "#1a1122",
                        "card-dark": "#241a30",
                        "border-dark": "#4d3465",
                        "surface-dark": "#362447",
                        "surface-dark-hover": "#4a3260",
                        "text-secondary": "#ad93c8",
                    },
                    fontFamily: {
                        "display": ["Lexend", "sans-serif"]
                    },
                    borderRadius: { "DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "2xl": "1rem", "full": "9999px" },
                },
            },
        }
    </script>
    <style>
        input[type=range] {
            -webkit-appearance: none; 
            background: transparent; 
        }
        input[type=range]::-webkit-slider-thumb {
            -webkit-appearance: none;
            height: 24px;
            width: 24px;
            border-radius: 50%;
            background: #7f19e6;
            cursor: pointer;
            margin-top: -10px; 
            border: 2px solid #ffffff;
        }
        input[type=range]::-webkit-slider-runnable-track {
            width: 100%;
            height: 4px;
            cursor: pointer;
            background: #4a3260;
            border-radius: 2px;
        }
        input[type=range]:focus {
            outline: none;
        }
        .scrollbar-hide::-webkit-scrollbar {
            display: none;
        }
        .scrollbar-hide {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }
        /* Custom scrollbar for dark theme */
        ::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }
        ::-webkit-scrollbar-track {
            background: #1a1122; 
        }
        ::-webkit-scrollbar-thumb {
            background: #362447; 
            border-radius: 4px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #7f19e6; 
        }
    </style>
</head>
<body class="bg-background-dark text-white font-display overflow-hidden selection:bg-primary selection:text-white">
    <div id="root" class="flex h-screen w-full"></div>
    <script type="module" src="/index.tsx"></script>
</body>
</html>
